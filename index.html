<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বিরিয়ানি ট্র্যাকার - Cyber Mask Bangladesh</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        body { font-family: 'Hind Siliguri', sans-serif; background-color: #f8fafc; }
        .branding-text { letter-spacing: 1px; }
    </style>
</head>
<body class="p-2 md:p-6">

    <div class="max-w-7xl mx-auto mb-6 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-2xl shadow-sm border-b-4 border-orange-500">
        <div class="text-center md:text-left mb-4 md:mb-0">
            <h1 class="text-2xl font-bold text-gray-800 branding-text">🍽️ বিরিয়ানি স্পট ট্র্যাকার</h1>
            <p class="text-orange-600 font-semibold text-sm">Make by <span class="underline">Cyber Mask Bangladesh</span></p>
        </div>
        <a href="https://www.facebook.com/cyber.mask.bangladesh" target="_blank" 
           class="flex items-center gap-2 bg-[#1877F2] hover:bg-[#166fe5] text-white px-5 py-2.5 rounded-full font-bold shadow-lg transition-all active:scale-95">
            ফেসবুক পেজ ভিজিট করুন
        </a>
    </div>

    <div class="max-w-3xl mx-auto mb-8">
        <input type="text" id="searchInput" onkeyup="searchSpots()" placeholder="এলাকা বা খাবারের নাম লিখে সার্চ করুন..." 
            class="w-full px-6 py-3 rounded-xl border-2 border-orange-200 shadow-md focus:border-orange-500 outline-none transition-all">
    </div>

    <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <div class="lg:col-span-1">
            <div class="bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
                <div class="bg-gradient-to-r from-orange-500 to-orange-600 p-4 text-white">
                    <h2 class="text-lg font-bold flex items-center gap-2">📢 তথ্য শেয়ার করুন</h2>
                </div>
                <form class="p-5 space-y-4" id="megaForm">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">স্থানের নাম *</label>
                        <input type="text" id="placeName" required class="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">এলাকা *</label>
                        <input type="text" id="area" required class="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 uppercase mb-1">কি দেওয়া হচ্ছে? (টাইপ করুন) *</label>
                        <input type="text" id="menuItem" required class="w-full px-3 py-2 border rounded-lg outline-none focus:ring-2 focus:ring-orange-400">
                    </div>
                    <button type="submit" id="submitBtn" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-lg active:scale-95 transition-all">সাবমিট করুন</button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-3">
            <div id="feedList" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDZP8JcHKDjPBHc709mDiwVT-4ELTujDMM",
            authDomain: "topup-zone-289cc.firebaseapp.com",
            databaseURL: "https://topup-zone-289cc-default-rtdb.firebaseio.com",
            projectId: "topup-zone-289cc",
            storageBucket: "topup-zone-289cc.appspot.com",
            messagingSenderId: "960114311476",
            appId: "1:960114311476:android:5d66dbe583f170c6b7a561"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const form = document.getElementById('megaForm');
        const feedList = document.getElementById('feedList');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.innerText = "প্রসেসিং...";

            try {
                const newSpotRef = db.ref('spots').push();
                await newSpotRef.set({
                    place: document.getElementById('placeName').value,
                    area: document.getElementById('area').value,
                    menu: document.getElementById('menuItem').value,
                    image: "https://via.placeholder.com/400x200?text=No+Image", // ডিফল্ট ইমেজ
                    status: 'pending',
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });

                form.reset();
                alert("সফলভাবে শেয়ার করা হয়েছে!");
            } catch (error) {
                console.error(error);
                alert("ত্রুটি: তথ্য সেভ করা যায়নি।");
            }
            
            submitBtn.disabled = false;
            submitBtn.innerText = "সাবমিট করুন";
        });

        db.ref('spots').on('value', (snapshot) => {
            const data = snapshot.val();
            if (!data) {
                feedList.innerHTML = '<div class="col-span-full text-center py-20 bg-white rounded-2xl border-2 border-dashed text-gray-400 font-bold">এখনো কোনো তথ্য নেই।</div>';
                return;
            }

            const sortedData = Object.keys(data).reverse();
            feedList.innerHTML = sortedData.map(key => {
                const item = data[key];
                return `
                    <div class="bg-white rounded-2xl shadow-md overflow-hidden flex flex-col hover:shadow-xl transition-all border border-gray-100">
                        <div class="p-4 flex-grow">
                            <h3 class="font-bold text-gray-800 text-lg">🏨 ${item.place}</h3>
                            <span class="bg-orange-100 text-orange-700 text-[10px] font-bold px-2 py-1 rounded">📍 ${item.area}</span>
                            <p class="mt-2 text-gray-700 text-sm font-medium italic border-l-2 border-orange-400 pl-2">"${item.menu}"</p>
                            
                            <div class="mt-4 text-center py-1.5 rounded-lg text-xs font-bold shadow-sm ${item.status === 'verified' ? 'bg-green-500 text-white' : item.status === 'fake' ? 'bg-red-500 text-white' : 'bg-blue-50 text-blue-600'}">
                                ${item.status === 'verified' ? '✓ ভেরিফাইড' : item.status === 'fake' ? '✕ ভুয়া তথ্য' : 'যাচাইয়ের অপেক্ষায়...'}
                            </div>
                        </div>
                        <div class="p-3 bg-gray-50 border-t grid grid-cols-2 gap-2">
                            <button onclick="setStatus('${key}', 'verified')" class="bg-white border border-green-500 text-green-600 text-[11px] font-bold py-2 rounded-lg hover:bg-green-500 hover:text-white transition">সত্য</button>
                            <button onclick="setStatus('${key}', 'fake')" class="bg-white border border-red-500 text-red-600 text-[11px] font-bold py-2 rounded-lg hover:bg-red-500 hover:text-white transition">মিথ্যা</button>
                        </div>
                    </div>
                `;
            }).join('');
        });

        window.setStatus = (id, status) => db.ref('spots/' + id).update({ status: status });

        function searchSpots() {
            const input = document.getElementById('searchInput').value.toLowerCase();
            db.ref('spots').once('value', (snapshot) => {
                const data = snapshot.val();
                if(!data) return;
                // সার্চ লজিক এখানে ডাটাবেজ ফিল্টার করবে
            });
        }
    </script>
</body>
</html>
